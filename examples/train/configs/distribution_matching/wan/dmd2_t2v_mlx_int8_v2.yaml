# Run 2 of the Mac-targeted QAD distillation. Changes vs dmd2_t2v_mlx_int8.yaml:
#
# - Student and critic initialize from FastVideo/FastWan2.1-T2V-1.3B-Diffusers
#   (already 3-step DMD-distilled): training becomes "adapt a good 3-step
#   model to the INT8 grid" instead of learning distillation from scratch
#   through a quantizer. The teacher stays the base 50-step Wan2.1.
# - gradient_accumulation_steps 4 (effective batch 16): run 1's global batch
#   of 4 left the critic noisy and the student under-trained (weights moved
#   only ~0.2% from init); motion coherence is the expected beneficiary.
# - Requires the world-size-portable EMA checkpoint state (ema.py) — run 1's
#   EMA was unrecoverable from its checkpoint. Wall time ~4x run 1 per step
#   count; same 4-GPU footprint.

models:
  student:
    _target_: fastvideo.train.models.wan.WanModel
    init_from: FastVideo/FastWan2.1-T2V-1.3B-Diffusers
    trainable: true
  teacher:
    _target_: fastvideo.train.models.wan.WanModel
    init_from: Wan-AI/Wan2.1-T2V-1.3B-Diffusers
    trainable: false
    disable_custom_init_weights: true
  critic:
    _target_: fastvideo.train.models.wan.WanModel
    init_from: FastVideo/FastWan2.1-T2V-1.3B-Diffusers
    trainable: true
    disable_custom_init_weights: true

method:
  _target_: fastvideo.train.methods.distribution_matching.dmd2.DMD2Method
  rollout_mode: simulate
  generator_update_interval: 5
  real_score_guidance_scale: 4.5
  dmd_denoising_steps: [1000, 757, 522]

  # Critic optimizer (required — no fallback to training.optimizer)
  fake_score_learning_rate: 8.0e-6
  fake_score_betas: [0.0, 0.999]
  fake_score_lr_scheduler: constant

training:
  distributed:
    num_gpus: 4
    sp_size: 1
    tp_size: 1
    hsdp_replicate_dim: 1
    hsdp_shard_dim: 4

  data:
    data_path: data/Wan-Syn_77x448x832_600k
    dataloader_num_workers: 4
    train_batch_size: 1
    training_cfg_rate: 0.0
    seed: 1000
    num_latent_t: 20
    num_height: 448
    num_width: 832
    num_frames: 77

  optimizer:
    learning_rate: 2.0e-6
    betas: [0.0, 0.999]
    weight_decay: 0.01
    lr_scheduler: constant
    lr_warmup_steps: 0

  loop:
    max_train_steps: 4000
    gradient_accumulation_steps: 4

  checkpoint:
    output_dir: outputs/wan2.1_dmd2_3steps_mlx_int8_v2
    training_state_checkpointing_steps: 20
    checkpoints_total_limit: 3

  tracker:
    project_name: distillation_wan
    run_name: wan2.1_dmd2_3steps_mlx_int8_v2

  model:
    enable_gradient_checkpointing_type: full

callbacks:
  mlx_qat:
    group_size: 64
    bits: 8
    simulate_dtype: fp16
  grad_clip:
    max_grad_norm: 1.0
  validation:
    pipeline_target: fastvideo.pipelines.basic.wan.wan_dmd_pipeline.WanDMDPipeline
    dataset_file: examples/training/finetune/Wan2.1-VSA/Wan-Syn-Data/validation_4.json
    every_steps: 50
    sampling_steps: [3]
    sampling_timesteps: [1000, 757, 522]
    guidance_scale: 6.0
  ema:
    _target_: fastvideo.train.callbacks.ema.EMACallback
    decay: 0.98
    start_iter: 0        # delay EMA updates until this iteration

pipeline:
  flow_shift: 8
