# SF + QAD (INT8 mlx_qat) training smoke — Track C run-5 path validation.
#
# NOT a real recipe: the 14B teacher is swapped for 1.3B, data is a tiny
# synthetic parquet, validation/EMA are stripped, and only a couple of steps
# run. Goal: prove the self-forcing + mlx_qat recipe assembles, the QAD callback
# arms on the student, and a few steps produce finite loss on CUDA before a real
# run-5 launch. See fastvideo/tests/modal/make_synth_t2v_parquet.py.

models:
  student:
    _target_: fastvideo.train.models.wan.WanCausalModel
    init_from: wlsaidhi/SFWan2.1-T2V-1.3B-Diffusers
    trainable: true
  teacher:
    _target_: fastvideo.train.models.wan.WanModel
    init_from: Wan-AI/Wan2.1-T2V-1.3B-Diffusers  # smoke: 1.3B instead of 14B
    trainable: false
    disable_custom_init_weights: true
  critic:
    _target_: fastvideo.train.models.wan.WanModel
    init_from: Wan-AI/Wan2.1-T2V-1.3B-Diffusers
    trainable: true
    disable_custom_init_weights: true

method:
  _target_: fastvideo.train.methods.distribution_matching.self_forcing.SelfForcingMethod
  rollout_mode: simulate
  generator_update_interval: 5
  real_score_guidance_scale: 4.0
  dmd_denoising_steps: [1000, 750, 500, 250]
  warp_denoising_step: true
  chunk_size: 3
  student_sample_type: sde
  context_noise: 0.0
  same_step_across_blocks: true
  enable_gradient_in_rollout: true
  start_gradient_frame: 0
  fake_score_learning_rate: 4.0e-7
  fake_score_betas: [0.0, 0.999]
  fake_score_lr_scheduler: constant

training:
  distributed:
    num_gpus: 1
    sp_size: 1
    tp_size: 1
    hsdp_replicate_dim: 1
    hsdp_shard_dim: 1

  data:
    data_path: data/synth_t2v_smoke
    dataloader_num_workers: 1
    train_batch_size: 1
    training_cfg_rate: 0.0
    seed: 1000
    num_latent_t: 3
    num_height: 480
    num_width: 832
    num_frames: 9

  optimizer:
    learning_rate: 2.0e-6
    betas: [0.0, 0.999]
    weight_decay: 0.01
    lr_scheduler: constant
    lr_warmup_steps: 0

  loop:
    max_train_steps: 2
    gradient_accumulation_steps: 1

  checkpoint:
    output_dir: outputs/sf_qad_smoke
    training_state_checkpointing_steps: 0
    checkpoints_total_limit: 1

  tracker:
    project_name: sf-qad-smoke
    run_name: sf_qad_int8_smoke

  model:
    enable_gradient_checkpointing_type: full

callbacks:
  grad_clip:
    max_grad_norm: 1.0
  mlx_qat:
    group_size: 64
    bits: 8

pipeline:
  flow_shift: 5
  dit_config:
    local_attn_size: -1
    sink_size: 0
